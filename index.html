<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coin Toss Probability Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:linear-gradient(120deg,#fff,#fff5f5);
min-height:100vh;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
from{background-position:left}
to{background-position:right}
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

header{
text-align:center;
margin-bottom:30px;
}

header h1{
color:#d64545;
font-size:2rem;
}

/* CARD */

.card{
background:white;
border-radius:16px;
padding:30px;
margin-bottom:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* COIN 3D */

.coin-scene{
width:140px;
height:140px;
margin:auto;
perspective:1000px;
}

.coin{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 1.2s;
}

.coin.spin{
transform:rotateY(1440deg);
}

.coin-face{

position:absolute;
width:100%;
height:100%;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
font-weight:600;

backface-visibility:hidden;

background:linear-gradient(145deg,#ffd700,#f5b700);
border:6px solid #e0b200;

box-shadow:
inset 0 0 10px rgba(255,255,255,0.8),
0 10px 20px rgba(0,0,0,0.25);

}

.coin-face.back{
transform:rotateY(180deg);
}

/* BUTTON */

.buttons{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

button{
border:none;
background:#ff6b6b;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
transition:.2s;
font-weight:500;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button:hover{
background:#e63946;
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button:active{
transform:scale(.95);
}

/* STATS */

.stats{
display:flex;
justify-content:space-around;
margin-top:25px;
flex-wrap:wrap;
}

.stat{
text-align:center;
}

.stat h3{
color:#d64545;
font-size:1.7rem;
}

/* CHART */

.chart-area{
max-width:420px;
margin:auto;
position:relative;
}

.no-data{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#999;
}

/* FALLING COINS */

.falling{
position:fixed;
top:-50px;
font-size:28px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.popup-box{
background:white;
padding:35px;
border-radius:14px;
text-align:center;
animation:pop .4s;
}

@keyframes pop{
from{transform:scale(.7)}
to{transform:scale(1)}
}

.popup-box h2{
color:#e63946;
margin-bottom:10px;
}

/* KNOWLEDGE */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.knowledge{
padding:18px;
border-radius:12px;
background:#fff;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.knowledge h4{
color:#d64545;
margin-bottom:6px;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Coin Toss Probability Lab</h1>
<p>ทดลองโยนเหรียญเพื่อเรียนรู้ความน่าจะเป็น</p>
</header>

<div class="card">

<div class="coin-scene">

<div id="coin" class="coin">

<div class="coin-face">🦁</div>
<div class="coin-face back">🌿</div>

</div>

</div>

<div class="buttons">

<button onclick="tossCoin()">โยนเหรียญ</button>
<button onclick="tossMultiple(100)">โยน 100 ครั้ง</button>
<button onclick="tossMultiple(1000)">โยน 1000 ครั้ง</button>
<button onclick="resetData()">รีเซ็ต</button>

</div>

<div class="stats">

<div class="stat">
<h3 id="heads">0</h3>
<p>หัว</p>
</div>

<div class="stat">
<h3 id="tails">0</h3>
<p>ก้อย</p>
</div>

<div class="stat">
<h3 id="hp">0%</h3>
<p>เปอร์เซ็นต์หัว</p>
</div>

<div class="stat">
<h3 id="tp">0%</h3>
<p>เปอร์เซ็นต์ก้อย</p>
</div>

</div>

</div>

<div class="card">

<div class="chart-area">

<canvas id="chart"></canvas>
<div id="nodata" class="no-data">ยังไม่มีข้อมูล</div>

</div>

</div>

<footer>
Probability Learning Web App
</footer>

</div>

<div id="popup" class="popup">

<div class="popup-box">

<h2 id="resultText"></h2>

<button onclick="closePopup()">ปิด</button>

</div>

</div>

<script>

let heads=0
let tails=0

const coin=document.getElementById("coin")

/* SOUND */

const spinSound=new Audio("https://actions.google.com/sounds/v1/coins/coin_spin.ogg")
const coinSound=new Audio("https://actions.google.com/sounds/v1/coins/coin_drop.ogg")

/* CHART */

const chart=new Chart(document.getElementById("chart"),{

type:'pie',

data:{
labels:["หัว","ก้อย"],
datasets:[{
data:[1,1],
backgroundColor:["#ddd","#ddd"]
}]
}

})

function update(){

let total=heads+tails

if(total===0){

document.getElementById("nodata").style.display="block"
chart.data.datasets[0].backgroundColor=["#ddd","#ddd"]
chart.data.datasets[0].data=[1,1]

}else{

document.getElementById("nodata").style.display="none"
chart.data.datasets[0].backgroundColor=["#ff6b6b","#ffd6d6"]
chart.data.datasets[0].data=[heads,tails]

}

let hp=total?((heads/total)*100).toFixed(1):0
let tp=total?((tails/total)*100).toFixed(1):0

document.getElementById("heads").textContent=heads
document.getElementById("tails").textContent=tails
document.getElementById("hp").textContent=hp+"%"
document.getElementById("tp").textContent=tp+"%"

chart.update()

}

/* FALLING COINS */

function fallingCoins(n){

for(let i=0;i<Math.min(n,40);i++){

let c=document.createElement("div")
c.className="falling"
c.innerHTML="🪙"

c.style.left=Math.random()*100+"vw"
c.style.animationDuration=(2+Math.random()*2)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),4000)

}

}

/* COIN TOSS */

function tossCoin(){

spinSound.play()

coin.classList.add("spin")

setTimeout(()=>{

let result=Math.random()<0.5?"หัว":"ก้อย"

if(result==="หัว") heads++
else tails++

coinSound.play()

update()

showResult("ผลลัพธ์: "+result)

coin.classList.remove("spin")

},1200)

}

/* MULTI */

function tossMultiple(n){

spinSound.play()

fallingCoins(n)

let h=0
let t=0

for(let i=0;i<n;i++){

Math.random()<0.5?h++:t++

}

heads+=h
tails+=t

update()

setTimeout(()=>{

coinSound.play()
showResult("สุ่ม "+n+" ครั้ง<br>หัว "+h+" | ก้อย "+t)

},1500)

}

/* POPUP */

function showResult(text){

document.getElementById("resultText").innerHTML=text
document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function resetData(){

heads=0
tails=0
update()

}

</script>

</body>
</html>
