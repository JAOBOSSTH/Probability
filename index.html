<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Probability Cafe Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{

background:#f4eee8;
color:#3e2f23;
overflow-x:hidden;
padding:30px;

}

/* steam effect */

.steam{

position:fixed;
bottom:-100px;
width:200px;
height:200px;
background:radial-gradient(circle,rgba(255,255,255,0.4),transparent);
border-radius:50%;
animation:steam 8s infinite;

}

.steam:nth-child(1){left:20%;animation-delay:0s}
.steam:nth-child(2){left:50%;animation-delay:2s}
.steam:nth-child(3){left:75%;animation-delay:4s}

@keyframes steam{

0%{transform:translateY(0) scale(.5);opacity:.4}
100%{transform:translateY(-900px) scale(2);opacity:0}

}

.container{

max-width:1000px;
margin:auto;

}

h1{

text-align:center;
margin-bottom:25px;

}

.machine{

background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;

}

.box{

width:150px;
height:150px;
background:#c49a6c;
border-radius:20px;
margin:auto;
position:relative;
overflow:visible;

}

.ball{

width:40px;
height:40px;
border-radius:50%;
position:absolute;
bottom:20px;
left:55px;

}

.red{background:#e74c3c}
.blue{background:#3498db}
.green{background:#2ecc71}
.yellow{background:#f1c40f}

/* bounce */

.bounce{

animation:bounce .8s ease;

}

@keyframes bounce{

0%{transform:translateY(0)}
30%{transform:translateY(-120px)}
60%{transform:translateY(-40px)}
100%{transform:translateY(0)}

}

/* shake */

.shake{

animation:shake .5s;

}

@keyframes shake{

0%{transform:translateX(0)}
25%{transform:translateX(6px)}
50%{transform:translateX(-6px)}
75%{transform:translateX(4px)}
100%{transform:translateX(0)}

}

.controls{

margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;

}

button{

padding:10px 16px;
border:none;
border-radius:10px;
background:#6f4e37;
color:white;
cursor:pointer;

}

.stats{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;

}

.card{

background:#fafafa;
padding:10px;
border-radius:10px;
text-align:center;

}

.chart{

margin-top:30px;
background:white;
padding:20px;
border-radius:20px;

}

</style>
</head>

<body>

<div class="steam"></div>
<div class="steam"></div>
<div class="steam"></div>

<div class="container">

<h1>☕ Probability Cafe Lab</h1>

<div class="machine">

<div id="box" class="box"></div>

<div class="controls">

<button onclick="draw(1)">สุ่ม 1</button>
<button onclick="draw(200)">สุ่ม 200</button>
<button onclick="draw(5000)">สุ่ม 5000</button>

<button onclick="toggleMode()">โหมดใส่คืน</button>

<button onclick="reset()">รีเซ็ต</button>

</div>

<div class="stats">

<div class="card">🔴 แดง <span id="r">0</span></div>
<div class="card">🔵 น้ำเงิน <span id="b">0</span></div>
<div class="card">🟢 เขียว <span id="g">0</span></div>
<div class="card">🟡 เหลือง <span id="y">0</span></div>

</div>

</div>

<div class="chart">

<canvas id="chart"></canvas>

</div>

</div>

<script>

let baseBalls=["red","red","red","red","blue","blue","blue","green","green","yellow"]
let balls=[...baseBalls]

let replace=true

let stats={red:0,blue:0,green:0,yellow:0}

function playSound(){

let audio=new Audio("https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3")
audio.play()

}

function randomBall(){

let i=Math.floor(Math.random()*balls.length)
let c=balls[i]

if(!replace)balls.splice(i,1)

return c

}

function draw(n){

let box=document.getElementById("box")

box.classList.add("shake")

playSound()

setTimeout(()=>{

box.classList.remove("shake")

for(let i=0;i<n;i++){

if(balls.length==0)break

let c=randomBall()

stats[c]++

spawnBall(c)

}

update()

},500)

}

function spawnBall(color){

let ball=document.createElement("div")

ball.className="ball "+color+" bounce"

document.getElementById("box").appendChild(ball)

setTimeout(()=>{

ball.remove()

},900)

}

function update(){

r.innerText=stats.red
b.innerText=stats.blue
g.innerText=stats.green
y.innerText=stats.yellow

let total=stats.red+stats.blue+stats.green+stats.yellow

chart.data.datasets[0].data=[

stats.red/total*100||0,
stats.blue/total*100||0,
stats.green/total*100||0,
stats.yellow/total*100||0

]

chart.update()

}

function toggleMode(){

replace=!replace

}

function reset(){

stats={red:0,blue:0,green:0,yellow:0}
balls=[...baseBalls]

update()

}

let ctx=document.getElementById("chart")

let chart=new Chart(ctx,{

type:"bar",

data:{

labels:["แดง","น้ำเงิน","เขียว","เหลือง"],

datasets:[

{
label:"เปอร์เซ็นต์จริง",
data:[0,0,0,0]
},

{
label:"เปอร์เซ็นต์ทฤษฎี",
data:[40,30,20,10]
}

]

},

options:{responsive:true}

})

</script>

</body>
</html>
