<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>โยนเหรียญหัวก้อย</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:linear-gradient(120deg,#fff7f7,#ffecec);
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* HEADER */

header{
text-align:center;
margin-bottom:25px;
}

header h1{
color:#e63946;
font-size:1.8rem;
}

/* CARD */

.card{

background:white;

border-radius:16px;

padding:25px;

margin-bottom:20px;

box-shadow:0 12px 30px rgba(0,0,0,0.08);

text-align:center;

}

/* COIN */

.coin-stage{

display:flex;
justify-content:center;
align-items:center;
height:150px;
perspective:1000px;

}

.coin{

width:110px;
height:110px;

border-radius:50%;

background:radial-gradient(circle,#ffd700,#d9a400);

border:6px solid #c48b00;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;

box-shadow:
inset 0 0 10px rgba(255,255,255,0.9),
0 12px 20px rgba(0,0,0,0.2);

transition:transform 1.2s;

}

/* BUTTON */

.buttons{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:15px;

}

button{

padding:10px 18px;

border:none;

border-radius:10px;

font-weight:600;

color:white;

background:linear-gradient(135deg,#ff6b6b,#e63946);

cursor:pointer;

transition:.25s;

}

button:hover{
transform:translateY(-2px);
}

/* STATS */

.stats{

display:flex;
justify-content:space-around;
margin-top:20px;

}

.stat h3{

color:#e63946;
font-size:1.7rem;

}

/* CHART */

.chart-wrap{

display:flex;
justify-content:center;
align-items:center;

}

canvas{
max-width:260px;
}

/* FLOAT BALL */

.ball{

position:fixed;

top:-20px;

width:10px;
height:10px;

border-radius:50%;

animation:fall linear forwards;

}

@keyframes fall{

to{
transform:translateY(110vh);
opacity:0;
}

}

/* POPUP */

.popup{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.5);

display:none;

align-items:center;
justify-content:center;

}

.popup-box{

background:white;

padding:35px;

border-radius:14px;

text-align:center;

}

.popup-box h2{

color:#e63946;
margin-bottom:12px;

}

</style>
</head>

<body>

<div class="container">

<header>

<h1>Coin Probability </h1>
<p>แอพทดลองความน่าจะเป็นในการโยนเหรียญ</p>

</header>

<div class="card">

<div class="coin-stage">

<div id="coin" class="coin">🦁</div>

</div>

<div class="buttons">

<button onclick="toss()">โยน 1 ครั้ง</button>
<button onclick="multi(100)">โยน 100 ครั้ง</button>
<button onclick="multi(1000)">โยน 1000 ครั้ง</button>
<button onclick="reset()">รีเซ็ตข้อมูล</button>

</div>

<div class="stats">

<div class="stat">
<h3 id="h">0</h3>
<p>จำนวนการออกหัว</p>
</div>

<div class="stat">
<h3 id="t">0</h3>
<p>จำนวนการออกก้อย</p>
</div>

</div>

</div>

<div class="card">

<div class="chart-wrap">

<canvas id="chart"></canvas>

</div>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h2 id="result"></h2>

<button onclick="closePop()">ปิดผลการประกาศ</button>

</div>

</div>

<script>

const coin=document.getElementById("coin")

let heads=0
let tails=0

/* SOUND */

const spin=new Audio("https://actions.google.com/sounds/v1/coins/coin_spin.ogg")
const win=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

/* CHART */

const chart=new Chart(document.getElementById("chart"),{

type:"pie",

plugins:[ChartDataLabels],

data:{
labels:["หัว","ก้อย"],
datasets:[{

data:[0,0],

backgroundColor:["#ff6b6b","#ffd6d6"]

}]
},

options:{
plugins:{
datalabels:{
color:"#fff",
font:{weight:"bold"},
formatter:(v,ctx)=>{

let total=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0)

if(total===0)return "0%"

return Math.round(v/total*100)+"%"

}
}
}
}

})

function update(){

document.getElementById("h").textContent=heads
document.getElementById("t").textContent=tails

chart.data.datasets[0].data=[heads,tails]

chart.update()

}

/* TOSS */

function toss(){

spin.play()

let r=Math.random()<0.5?"หัว":"ก้อย"

coin.style.transform="rotateY(1800deg)"

setTimeout(()=>{

coin.style.transform="rotateY(0deg)"

if(r==="หัว"){
coin.innerHTML="🦁"
heads++
}else{
coin.innerHTML="🌿"
tails++
}

update()

win.play()

show("ผลการโยนเหรียญ: "+r)

confetti()

},1200)

}

/* MULTI */

function multi(n){

let h=0
let t=0

for(let i=0;i<n;i++){

Math.random()<0.5?h++:t++

}

heads+=h
tails+=t

update()

show("โยน "+n+" ครั้ง<br>หัว "+h+" | ก้อย "+t)

win.play()

confetti()

}

/* CONFETTI */

function confetti(){

for(let i=0;i<50;i++){

let c=document.createElement("div")

c.className="ball"

c.style.left=Math.random()*100+"vw"

c.style.background=["red","yellow","blue","green","orange"][Math.floor(Math.random()*5)]

c.style.animationDuration=(2+Math.random()*2)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),4000)

}

}

/* FLOAT BALL LOOP */

setInterval(()=>{

let b=document.createElement("div")

b.className="ball"

b.style.left=Math.random()*100+"vw"

b.style.background=["#ff6b6b","#ffd166","#06d6a0","#118ab2"][Math.floor(Math.random()*4)]

b.style.animationDuration=(5+Math.random()*4)+"s"

document.body.appendChild(b)

setTimeout(()=>b.remove(),9000)

},600)

/* POPUP */

function show(t){

document.getElementById("result").innerHTML=t

document.getElementById("popup").style.display="flex"

}

function closePop(){

document.getElementById("popup").style.display="none"

}

/* RESET */

function reset(){

heads=0
tails=0
update()

}

</script>

</body>
</html>
