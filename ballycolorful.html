<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Ball Probability Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Prompt',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:white;
color:#333;
font-weight:600;
}

.ball{
width:80px;
height:80px;
border-radius:50%;
margin:20px auto;
}

.stats{
margin-top:20px;
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h2>🎱 Ball Probability Simulator</h2>
<p>จำลองการหยิบลูกบอลจากกล่อง</p>

<div id="ball" class="ball" style="background:gray"></div>

<button onclick="drawBall()">สุ่มหยิบลูกบอล</button>

<div id="result"></div>

<div class="stats" id="stats"></div>

</div>

<script>

let balls=[
"red","red","red","red",
"blue","blue","blue",
"green","green",
"yellow"
]

let stats={
red:0,
blue:0,
green:0,
yellow:0
}

function drawBall(){

let randomIndex=Math.floor(Math.random()*balls.length)

let color=balls[randomIndex]

stats[color]++

let ball=document.getElementById("ball")

ball.style.background=color

document.getElementById("result").innerHTML=
"คุณหยิบได้ลูกบอลสี <b>"+color+"</b>"

document.getElementById("stats").innerHTML=
`
📊 สถิติการหยิบ<br>
แดง: ${stats.red}<br>
น้ำเงิน: ${stats.blue}<br>
เขียว: ${stats.green}<br>
เหลือง: ${stats.yellow}
`

}

</script>

</body>
</html>
