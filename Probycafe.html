<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Cafe Probability Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif;
}

body{
background:#F7F3EE;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#3A2E2A,#6b4f3a);
color:white;
text-align:center;
padding:24px;
}

header h1{
font-size:28px;
}

header p{
font-size:13px;
opacity:.9;
}

main{
max-width:1100px;
margin:auto;
padding:18px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}

.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

button{
border:none;
padding:12px 18px;
border-radius:12px;
background:#C89F7B;
color:white;
font-weight:500;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-3px);
}

.result{
margin-top:16px;
font-size:20px;
font-weight:600;
text-align:center;
color:#3A2E2A;
}

.insight{
margin-top:10px;
background:#fff6e9;
padding:10px;
border-radius:10px;
font-size:13px;
}

</style>
</head>

<body>

<header>

<h1>☕ Cafe Probability Lab</h1>
<p>ทดลองความน่าจะเป็นผ่านการสุ่มเมนูเครื่องดื่ม</p>

</header>

<main>

<div class="grid">

<div class="card">

<h3>🎟 Lucky Coupon Machine</h3>

<br>

<button onclick="draw()">สุ่มเครื่องดื่ม</button>

<div class="result" id="result">
กดเพื่อเริ่มสุ่ม
</div>

<div class="insight" id="insight">
ระบบสุ่มนี้ใช้หลักความน่าจะเป็นแบบโอกาสเท่ากัน
</div>

</div>

<div class="card">

<h3>📊 Statistics</h3>

<canvas id="chart"></canvas>

</div>

</div>

</main>

<script>

const drinks=[
"Americano","Espresso","Latte","Cappuccino","Mocha",
"Caramel Latte","Thai Tea","Green Tea","Matcha Latte",
"Lemon Tea","Peach Tea","Fresh Milk","Cocoa","Dark Cocoa",
"Chocolate Milk","Vanilla Milk","Strawberry Soda",
"Blue Hawaii Soda","Lime Soda","Honey Lemon"
]

let count={}

drinks.forEach(d=>count[d]=0)

let chart

function draw(){

let d=drinks[Math.floor(Math.random()*drinks.length)]

count[d]++

document.getElementById("result").innerHTML="🎉 "+d

updateChart()

}

function updateChart(){

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:drinks,
datasets:[{
data:drinks.map(d=>count[d])
}]
},
options:{
plugins:{
legend:{display:false}
}
}
})

}

</script>

</body>
</html>
